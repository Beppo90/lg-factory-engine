services:
  api:
    build: .
    container_name: lg-factory-api
    env_file: .env
    environment:
      - OUTPUT_DIR=/app/output
    volumes:
      - output_data:/app/output
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lg-factory-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  output_data:
